
<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>

body{
font-family:Poppins;
background:#eef3ff;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{
background:white;
padding:35px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
width:300px;
text-align:center;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border-radius:6px;
border:1px solid #ccc;
}

button{
padding:10px;
width:100%;
background:#2b7de9;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="login-box">

<h2>Login</h2>

<input type="text" placeholder="Username">

<input type="password" placeholder="Password">

<button onclick="loginUser()">Login</button>

</div>

<script>

function loginUser(){
 window.location.href="location.html"
}

</script>

</body>
</html>
